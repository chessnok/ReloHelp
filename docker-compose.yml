services:
  backend:
    build: backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mcp:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      MCP_SERVER_URL: http://mcp:8001/mcp
    env_file: backend/.env

  mcp:
    build: backend
    command: ["uv", "run", "python", "-m", "app.mcp.run_server"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    env_file: backend/.env
    ports:
      - "8001:8001"

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2s
    ports:
      - "5432:5432"

  nginx:
    build: frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  db_data:
